<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MovieLibrary{% endblock %}</title>
</head>
<body>
<nav>
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('users') }}">All Users</a>
    <a href="{{ url_for('add_user_form') }}">Add User</a>
</nav>
<hr>
{% if request.args.get('error') %}
    <ul style="background:#fff3cd; border:1px solid #ffe08a; padding:10px 16px; list-style:none;">
        <li>{{ request.args.get('error') }}</li>
    </ul>
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
