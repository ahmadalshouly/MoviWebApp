{% extends "base.html" %}
{% block title %}All Users{% endblock %}
{% block content %}
    <h1>All Users</h1>
    <ul class="plain">
        {% for user in users %}
            <li><a href="{{ url_for('movies', user_id=user.id) }}">{{ user.name }}</a></li>
        {% else %}
            <li>No users yet.</li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('add_user_form') }}">+ Add a user</a>
{% endblock %}
