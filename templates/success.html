{% extends "base.html" %}
{% block title %}Done{% endblock %}
{% block content %}
    <div class="center-card">
        <div class="big-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h1 style="font-size: 26px;">Done</h1>
        <p>{{ message }}</p>
        {% if user_id %}
            <a class="btn btn-primary" href="{{ url_for('movies', user_id=user_id) }}"><i class="fa-solid fa-film"></i> Back to Collection</a>
        {% else %}
            <a class="btn btn-primary" href="{{ url_for('index') }}"><i class="fa-solid fa-house"></i> Back to Home</a>
        {% endif %}
    </div>
{% endblock %}
